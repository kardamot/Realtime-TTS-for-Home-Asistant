name: "Alice Control Panel"
version: "0.1.23"
slug: "alice_control_panel"
description: "Direct web control panel and server for Alice ESP robot, voice pipeline, prompts, config, and logs"
startup: "application"
boot: "auto"
init: false
arch:
  - amd64
webui: "http://[HOST]:[PORT:8099]"
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Alice Control Panel direct web UI and API"
options:
  port: 8099
  panel_token: ""
  panel_password: ""
  esp_base_url: ""
  esp_max_auto_reconnects: 40
  esp_audio_ack_timeout_sec: 3
  debug_logs: true
  safe_mode: false
  stt:
    provider: "faster_whisper"
    model: "small"
    language: "tr"
    compute_type: "int8"
    beam_size: 1
    vad_filter: false
  llm:
    provider: "openai"
    model: "gpt-5-mini"
    api_key: ""
    base_url: "https://api.openai.com/v1"
    system_prompt: ""
    temperature: 0.6
    stream: true
    providers:
      openai:
        api_key: ""
        model: "gpt-5-mini"
        base_url: "https://api.openai.com/v1"
      openrouter:
        api_key: ""
        model: "openai/gpt-5-mini"
        base_url: "https://openrouter.ai/api/v1"
      openai_compatible:
        api_key: ""
        model: ""
        base_url: ""
  realtime:
    enabled: true
    provider: "openai"
    model: "gpt-realtime-mini"
    ws_url: "wss://api.openai.com/v1/realtime"
    input_sample_rate: 24000
    turn_detection: "server_vad"
    vad_threshold: 0.5
    prefix_padding_ms: 300
    silence_duration_ms: 420
    transcription_model: "gpt-4o-mini-transcribe"
    response_timeout_ms: 12000
    noise_reduction: "near_field"
    instructions: ""
  tts:
    enabled: true
    provider: "openai"
    pcm_sample_rate: 44100
    esp_initial_buffer_ms: 1500
    esp_silence_prefix_ms: 450
    openai:
      api_key: ""
      model: "gpt-4o-mini-tts"
      voice: "coral"
      instructions: "Turkce konus. Kadinsi, alimli, muzip, hafif seytansi ve tatli tatli igneleyici bir tonda oku."
    cartesia:
      api_key: ""
      model_id: "sonic-3"
      voice_id: ""
      language: "tr"
      version: "2026-03-01"
    elevenlabs:
      api_key: ""
      model_id: "eleven_flash_v2_5"
      voice_id: ""
      output_format: "pcm_16000"
      latency_mode: 3
    google_ai:
      api_key: ""
      model: "gemini-2.5-flash-preview-tts"
      voice_name: "Kore"
      prompt_prefix: ""
    google_cloud:
      credentials_json: ""
      voice_name: "tr-TR-Chirp3-HD-Kore"
      language_code: "tr-TR"
      ssml_gender: "FEMALE"
schema:
  port: port
  panel_token: password
  panel_password: password
  esp_base_url: str
  esp_max_auto_reconnects: int
  esp_audio_ack_timeout_sec: int
  debug_logs: bool
  safe_mode: bool
  stt:
    provider: list(faster_whisper)
    model: str
    language: str
    compute_type: str
    beam_size: int
    vad_filter: bool
  llm:
    provider: list(openai|openrouter|openai_compatible|mock|none)
    model: str
    api_key: password
    base_url: str
    system_prompt: str
    temperature: float
    stream: bool
    providers:
      openai:
        api_key: password
        model: str
        base_url: str
      openrouter:
        api_key: password
        model: str
        base_url: str
      openai_compatible:
        api_key: password
        model: str
        base_url: str
  realtime:
    enabled: bool
    provider: list(openai)
    model: str
    ws_url: str
    input_sample_rate: int
    turn_detection: list(server_vad|semantic_vad)
    vad_threshold: float
    prefix_padding_ms: int
    silence_duration_ms: int
    transcription_model: str
    response_timeout_ms: int
    noise_reduction: list(near_field|far_field|none)
    instructions: str
  tts:
    enabled: bool
    provider: list(openai|cartesia|elevenlabs|google_ai|google_cloud)
    pcm_sample_rate: int
    esp_initial_buffer_ms: int
    esp_silence_prefix_ms: int
    openai:
      api_key: password
      model: str
      voice: str
      instructions: str
    cartesia:
      api_key: password
      model_id: str
      voice_id: str
      language: str
      version: str
    elevenlabs:
      api_key: password
      model_id: str
      voice_id: str
      output_format: str
      latency_mode: int
    google_ai:
      api_key: password
      model: str
      voice_name: str
      prompt_prefix: str
    google_cloud:
      credentials_json: password
      voice_name: str
      language_code: str
      ssml_gender: list(SSML_VOICE_GENDER_UNSPECIFIED|MALE|FEMALE|NEUTRAL)
