name: "Alice Control Panel"
version: "0.1.16"
slug: "alice_control_panel"
description: "Direct web control panel and server for Alice ESP robot, voice pipeline, prompts, config, and logs"
startup: "application"
boot: "auto"
init: false
arch:
  - amd64
webui: "http://[HOST]:[PORT:8099]"
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Alice Control Panel direct web UI and API"
options:
  port: 8099
  panel_token: ""
  panel_password: ""
  esp_base_url: ""
  esp_max_auto_reconnects: 40
  debug_logs: true
  safe_mode: false
  stt:
    provider: "faster_whisper"
    model: "small"
    language: "tr"
    compute_type: "int8"
    beam_size: 1
    vad_filter: false
  llm:
    provider: "openai"
    model: "gpt-5-mini"
    api_key: ""
    base_url: "https://api.openai.com/v1"
    system_prompt: ""
  tts:
    enabled: true
    provider: "openai"
    pcm_sample_rate: 44100
    openai:
      api_key: ""
      model: "gpt-4o-mini-tts"
      voice: "coral"
      instructions: "Turkce konus. Kadinsi, alimli, muzip, hafif seytansi ve tatli tatli igneleyici bir tonda oku."
    cartesia:
      api_key: ""
      model_id: "sonic-3"
      voice_id: ""
      language: "tr"
      version: "2026-03-01"
schema:
  port: port
  panel_token: password
  panel_password: password
  esp_base_url: str
  esp_max_auto_reconnects: int
  debug_logs: bool
  safe_mode: bool
  stt:
    provider: list(faster_whisper)
    model: str
    language: str
    compute_type: str
    beam_size: int
    vad_filter: bool
  llm:
    provider: list(openai|openrouter|mock|none)
    model: str
    api_key: password
    base_url: str
    system_prompt: str
  tts:
    enabled: bool
    provider: list(openai|cartesia|elevenlabs|google_ai|google_cloud)
    pcm_sample_rate: int
    openai:
      api_key: password
      model: str
      voice: str
      instructions: str
    cartesia:
      api_key: password
      model_id: str
      voice_id: str
      language: str
      version: str
