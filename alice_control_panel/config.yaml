name: "Alice Control Panel"
version: "0.1.34"
slug: "alice_control_panel"
description: "Direct web control panel and server for Alice ESP robot, voice pipeline, prompts, config, and logs"
startup: "application"
boot: "auto"
init: false
homeassistant_api: true
arch:
  - amd64
webui: "http://[HOST]:[PORT:8099]"
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Alice Control Panel direct web UI and API"
options:
  port: 8099
  panel_token: ""
  panel_password: ""
  esp_base_url: ""
  esp_max_auto_reconnects: 40
  esp_audio_ack_timeout_sec: 3
  debug_logs: true
  safe_mode: false
  stt:
    provider: "faster_whisper"
    model: "small"
    model_cache_dir: "/data/models/faster_whisper"
    language: "tr"
    compute_type: "int8"
    beam_size: 1
    vad_filter: false
  pipeline:
    stream_to_esp: true
    max_log_events_per_sec: 10
    mic_response_mode: "assistant"
    barge_in_enabled: true
    live_mic_enabled: true
    live_vad_enabled: true
    live_vad_provider: "silero"
    live_vad_silero_start_prob: 0.50
    live_vad_silero_end_prob: 0.28
    live_vad_start_rms: 450
    live_vad_end_rms: 260
    live_vad_min_speech_ms: 120
    live_vad_end_silence_ms: 650
    live_vad_pre_roll_ms: 300
    live_vad_max_utterance_ms: 12000
    live_vad_max_buffer_sec: 20
  llm:
    provider: "openai"
    model: "gpt-5-mini"
    api_key: ""
    base_url: "https://api.openai.com/v1"
    system_prompt: ""
    temperature: 0.6
    stream: true
    providers:
      openai:
        api_key: ""
        model: "gpt-5-mini"
        base_url: "https://api.openai.com/v1"
      openrouter:
        api_key: ""
        model: "openai/gpt-5-mini"
        base_url: "https://openrouter.ai/api/v1"
      openai_compatible:
        api_key: ""
        model: ""
        base_url: ""
  realtime:
    enabled: true
    provider: "openai"
    model: "gpt-realtime-mini"
    ws_url: "wss://api.openai.com/v1/realtime"
    input_sample_rate: 24000
    turn_detection: "server_vad"
    vad_threshold: 0.5
    prefix_padding_ms: 300
    silence_duration_ms: 420
    semantic_eagerness: "high"
    transcription_model: "gpt-4o-mini-transcribe"
    transcript_wait_ms: 800
    response_timeout_ms: 12000
    ha_tools_enabled: true
    suppress_empty_transcript_response: true
    noise_reduction: "near_field"
    instructions: ""
  ha_bridge:
    enabled: true
    api_base_url: "http://supervisor/core/api"
    conversation_agent_id: ""
    conversation_language: "tr"
    route_home_control: true
    expose_all_entities: false
    exposed_entities: ""
    exposed_domains: ""
    blocked_entities: ""
    allow_conversation_tool: false
  tts:
    enabled: true
    provider: "openai"
    pcm_sample_rate: 44100
    esp_initial_buffer_ms: 1500
    esp_silence_prefix_ms: 450
    openai:
      api_key: ""
      model: "gpt-4o-mini-tts"
      voice: "coral"
      instructions: "Turkce konus. Kadinsi, alimli, muzip, hafif seytansi ve tatli tatli igneleyici bir tonda oku."
    cartesia:
      api_key: ""
      model_id: "sonic-3"
      voice_id: ""
      language: "tr"
      version: "2026-03-01"
    elevenlabs:
      api_key: ""
      model_id: "eleven_flash_v2_5"
      voice_id: ""
      output_format: "pcm_16000"
      latency_mode: 3
    google_ai:
      api_key: ""
      model: "gemini-2.5-flash-preview-tts"
      voice_name: "Kore"
      prompt_prefix: ""
    google_cloud:
      credentials_json: ""
      voice_name: "tr-TR-Chirp3-HD-Kore"
      language_code: "tr-TR"
      ssml_gender: "FEMALE"
schema:
  port: port
  panel_token: password
  panel_password: password
  esp_base_url: str
  esp_max_auto_reconnects: int
  esp_audio_ack_timeout_sec: int
  debug_logs: bool
  safe_mode: bool
  stt:
    provider: list(faster_whisper)
    model: str
    model_cache_dir: str
    language: str
    compute_type: str
    beam_size: int
    vad_filter: bool
  pipeline:
    stream_to_esp: bool
    max_log_events_per_sec: int
    mic_response_mode: list(assistant|echo|echo_then_assistant)
    barge_in_enabled: bool
    live_mic_enabled: bool
    live_vad_enabled: bool
    live_vad_provider: list(silero|energy)
    live_vad_silero_start_prob: float
    live_vad_silero_end_prob: float
    live_vad_start_rms: int
    live_vad_end_rms: int
    live_vad_min_speech_ms: int
    live_vad_end_silence_ms: int
    live_vad_pre_roll_ms: int
    live_vad_max_utterance_ms: int
    live_vad_max_buffer_sec: int
  llm:
    provider: list(openai|openrouter|openai_compatible|mock|none)
    model: str
    api_key: password
    base_url: str
    system_prompt: str
    temperature: float
    stream: bool
    providers:
      openai:
        api_key: password
        model: str
        base_url: str
      openrouter:
        api_key: password
        model: str
        base_url: str
      openai_compatible:
        api_key: password
        model: str
        base_url: str
  realtime:
    enabled: bool
    provider: list(openai)
    model: str
    ws_url: str
    input_sample_rate: int
    turn_detection: list(server_vad|semantic_vad)
    vad_threshold: float
    prefix_padding_ms: int
    silence_duration_ms: int
    semantic_eagerness: list(low|medium|high|auto)
    transcription_model: str
    transcript_wait_ms: int
    response_timeout_ms: int
    ha_tools_enabled: bool
    suppress_empty_transcript_response: bool
    noise_reduction: list(near_field|far_field|none)
    instructions: str
  ha_bridge:
    enabled: bool
    api_base_url: str
    conversation_agent_id: str
    conversation_language: str
    route_home_control: bool
    expose_all_entities: bool
    exposed_entities: str
    exposed_domains: str
    blocked_entities: str
    allow_conversation_tool: bool
  tts:
    enabled: bool
    provider: list(openai|cartesia|elevenlabs|google_ai|google_cloud)
    pcm_sample_rate: int
    esp_initial_buffer_ms: int
    esp_silence_prefix_ms: int
    openai:
      api_key: password
      model: str
      voice: str
      instructions: str
    cartesia:
      api_key: password
      model_id: str
      voice_id: str
      language: str
      version: str
    elevenlabs:
      api_key: password
      model_id: str
      voice_id: str
      output_format: str
      latency_mode: int
    google_ai:
      api_key: password
      model: str
      voice_name: str
      prompt_prefix: str
    google_cloud:
      credentials_json: password
      voice_name: str
      language_code: str
      ssml_gender: list(SSML_VOICE_GENDER_UNSPECIFIED|MALE|FEMALE|NEUTRAL)
