name: "Alice Realtime TTS"
version: "0.3.0"
slug: "alice_realtime_tts"
description: "OpenAI, Cartesia, ElevenLabs, Google AI veya Google Cloud tabanli dusuk gecikmeli realtime TTS relay"
startup: "application"
boot: "auto"
init: false
arch:
  - amd64
ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: "Alice realtime TTS WebSocket"
options:
  provider: "openai"
  openai_api_key: ""
  openai_model: "gpt-4o-mini-tts"
  openai_voice: "coral"
  openai_instructions: "Turkce konus. Kadinsi, alimli, muzip, hafif seytansi ve tatli tatli igneleyici bir tonda oku. Sanki zeki, hazircevap ve oyunbaz bir kadin asistan konusuyormus gibi hissettir. Flortoz ama zarif ol. Robot gibi duz okuma, monoton konusma. Turkce telaffuza dikkat et, Ingilizce aksan kullanma."
  cartesia_api_key: ""
  cartesia_model_id: "sonic-3"
  cartesia_voice_id: ""
  cartesia_language: "tr"
  cartesia_version: "2026-03-01"
  elevenlabs_api_key: ""
  elevenlabs_model_id: "eleven_flash_v2_5"
  elevenlabs_voice_id: ""
  elevenlabs_output_format: "pcm_24000"
  elevenlabs_latency_mode: 3
  google_ai_api_key: ""
  google_ai_model: "gemini-3.1-flash-tts-preview"
  google_ai_voice_name: "Kore"
  google_ai_prompt_prefix: ""
  google_cloud_credentials_json: ""
  google_cloud_voice_name: ""
  google_cloud_language_code: "tr-TR"
  google_cloud_ssml_gender: "FEMALE"
  port: 8765
schema:
  provider: list(openai|cartesia|elevenlabs|google_ai|google_cloud)
  openai_api_key: password
  openai_model: str
  openai_voice: str
  openai_instructions: str
  cartesia_api_key: password
  cartesia_model_id: str
  cartesia_voice_id: str
  cartesia_language: str
  cartesia_version: str
  elevenlabs_api_key: password
  elevenlabs_model_id: str
  elevenlabs_voice_id: str
  elevenlabs_output_format: str
  elevenlabs_latency_mode: int
  google_ai_api_key: password
  google_ai_model: str
  google_ai_voice_name: str
  google_ai_prompt_prefix: str
  google_cloud_credentials_json: password
  google_cloud_voice_name: str
  google_cloud_language_code: str
  google_cloud_ssml_gender: list(SSML_VOICE_GENDER_UNSPECIFIED|MALE|FEMALE|NEUTRAL)
  port: port
