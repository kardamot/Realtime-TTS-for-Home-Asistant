name: "Alice Realtime Voice"
version: "0.9.5"
slug: "alice_realtime_voice"
description: "Ilk manuel canli test icin yerel STT + streaming LLM + HA conversation yonlendirme + dis TTS relay orkestrasyonu"
startup: "application"
boot: "manual"
init: false
homeassistant_api: true
arch:
  - amd64
ports:
  8766/tcp: 8766
ports_description:
  8766/tcp: "Alice realtime voice WebSocket"
options:
  port: 8766
  debug_logs: true
  stt:
    provider: "faster_whisper"
    model: "small"
    language: "tr"
    compute_type: "int8"
    beam_size: 1
    vad_filter: true
  endpointing:
    enabled: true
    auto_finalize_on_vad_end: false
    no_speech_timeout_ms: 5000
    speech_start_min_ms: 96
    speech_end_silence_ms: 520
    max_utterance_ms: 15000
    start_avg_abs_threshold: 150
    end_avg_abs_threshold: 110
  ha_bridge:
    enabled: true
    api_base_url: "http://supervisor/core/api"
    conversation_agent_id: ""
    conversation_language: "tr"
    route_home_control: true
  llm:
    provider: "openai"
    model: "gpt-5-mini"
    api_key: ""
    base_url: "https://api.openai.com/v1"
    system_prompt: ""
  tts:
    enabled: false
    relay_url: "ws://127.0.0.1:8765/ws"
schema:
  port: port
  debug_logs: bool
  stt:
    provider: list(faster_whisper)
    model: str
    language: str
    compute_type: str
    beam_size: int
    vad_filter: bool
  endpointing:
    enabled: bool
    auto_finalize_on_vad_end: bool
    no_speech_timeout_ms: int
    speech_start_min_ms: int
    speech_end_silence_ms: int
    max_utterance_ms: int
    start_avg_abs_threshold: int
    end_avg_abs_threshold: int
  ha_bridge:
    enabled: bool
    api_base_url: str
    conversation_agent_id: str
    conversation_language: str
    route_home_control: bool
  llm:
    provider: list(openai|openrouter|none)
    model: str
    api_key: password
    base_url: str
    system_prompt: str
  tts:
    enabled: bool
    relay_url: str
